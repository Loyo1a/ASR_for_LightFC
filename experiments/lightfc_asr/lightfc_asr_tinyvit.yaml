DATA:
  MAX_SAMPLE_INTERVAL: 200
  MEAN:
    - 0.485
    - 0.456
    - 0.406
  SAMPLER_TYPE: strict_consecutive
  SEQUENCE:
    MODE: strict_consecutive
    MAX_INTERVAL: 1
  SEARCH:
    CENTER_JITTER: 3
    FACTOR: 4.0
    FACTORS: [2.0, 4.0, 6.0, 8.0]
    SCALE_JITTER: 0.25
    SIZE: 256
    NUMBER: 8
  STD:
    - 0.229
    - 0.224
    - 0.225
  TEMPLATE:
    CENTER_JITTER: 0
    FACTOR: 2.0
    SCALE_JITTER: 0
    SIZE: 128
    NUMBER: 1
  TRAIN:
    DATASETS_NAME:
      - GOT10K_vottrain
    DATASETS_RATIO:
      - 1
    SAMPLE_PER_EPOCH: 2500
  VAL:
    DATASETS_NAME:
      - GOT10K_votval
    DATASETS_RATIO:
      - 1
    SAMPLE_PER_EPOCH: 1000
MODEL:
  ASR_ENABLE: true
  ASR_HIDDEN_DIM: 32
  BACKBONE:
    TYPE: 'tiny_vit_5m_224'
    STRIDE: 16
    CHANNEL: 160
    USE_PRETRAINED: True
    PRETRAIN_FILE: 'tiny_vit_5m_22k_distill.pth'
    LOAD_MODE: 3
    PARAMS:
      pretrained: False
  NECK:
    USE_NECK: False
  FUSION:
    TYPE: 'LFEM'
    CHANNEL: 160
    PARAMS:
      num_kernel: 64
      adj_channel: 96
  HEAD:
    TYPE: 'CenterPredictor'
    CHANNEL: 160
    PARAMS:
      inplanes: 256
      channel: 256
      feat_sz: 16
      stride: 16
      freeze_bn: False
TRAIN:
  TYPE: rl_only
  PRV_CKPT: checkpoints/train/lightfc_asr_warmup/lightfc_asr_warmup_tinyvit/LightFC_ep0300.pth.tar
  EPOCH: 50
  BATCH_SIZE: 2
  NUM_WORKER: 2
  LR: 0.0001
  SEED: 42
  GIOU_WEIGHT: 2.0
  L1_WEIGHT: 5.0
  LOC_WEIGHT: 1.0
  OPTIMIZER: ADAMW
  SCHEDULER:
    TYPE: step
    DECAY_RATE: 0.1
  LR_DROP_EPOCH: 40
  WEIGHT_DECAY: 0.0001
  MAX_GRAD_NORM: 5.0
  BACKBONE_MULTIPLIER: 0.1
  DROP_PATH_RATE: 0.1
  GRAD_CLIP_NORM: 0.1
  SAVE_INTERVAL: 5
  VAL_EPOCH_INTERVAL: 1
  PRINT_INTERVAL: 50
  AMP: False
  L_LOSS: 'l1'
  BOX_LOSS: 'wiou'
  CLS_LOSS: 'focal'
  ALPHA_IOU: 1.0
  BETA_AUC: 1.0
  ETA_COST: 0.10
  VALUE_WEIGHT: 0.50
  ADV_NORM: true
TEST:
  EPOCH: 50
  SEARCH_FACTOR: 4.0
  SEARCH_SIZE: 256
  TEMPLATE_FACTOR: 2.0
  TEMPLATE_SIZE: 128
  INIT_SEARCH_FACTOR: 4.0
  ASR_ENABLE: true
